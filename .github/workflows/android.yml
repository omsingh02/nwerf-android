name: Android CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease -x lint -x lintVitalRelease

      - name: Sign Android Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Extract SHA-1
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          keytool -list -v -keystore release.keystore -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > cert_info.txt || true
          grep "SHA1:" cert_info.txt > sha1.txt || true

      - name: Upload SHA-1 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha1-fingerprint
          path: sha1.txt

      - name: Rename APKs for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk nwerf-android-${{ github.ref_name }}-debug.apk
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} nwerf-android-${{ github.ref_name }}-release-signed.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nwerf-native-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          files: |
            nwerf-android-${{ github.ref_name }}-release-signed.apk
            nwerf-android-${{ github.ref_name }}-debug.apk

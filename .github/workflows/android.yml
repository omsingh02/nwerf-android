name: Android CI

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        continue-on-error: true
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        continue-on-error: true
        run: ./gradlew testDebugUnitTest

      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease -x lintVitalRelease -x lint

      - name: Sign Android Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"


      - name: Rename APKs for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk nwerf-android-${{ github.ref_name }}-debug.apk
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} nwerf-android-${{ github.ref_name }}-release-signed.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nwerf-native-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-dev') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          files: |
            nwerf-android-${{ github.ref_name }}-release-signed.apk
            nwerf-android-${{ github.ref_name }}-debug.apk
